set -g default-command "${SHELL}"
# override colors
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
# mouse support
set -g mouse on
# set tmux bind to ctrl+space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
# Refresh tmux config with r
unbind r
bind r source-file ~/.config/tmux/tmux.conf
# copy from ssh
set -s set-clipboard on
# source theme
source "~/.config/tmux/tmuxline/everforest-dark.tmux.conf"
# reload config file
bind-key -T prefix r source-file "~/.config/tmux/tmux.conf"
# split windows with Ctrl+s and Ctrl+v
bind-key -T prefix C-t split-window
bind-key -T prefix C-v split-window -h
set-window-option -g mode-keys vi
# Start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection 
# Copy text with "y"
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'sainnhe/tmux-net-speed'
set -g @plugin 'sainnhe/tmux-plugin-sysstat'
set -g @plugin 'sainnhe/tmux-fzf'
# set -g @plugin 'toddyamakawa/tmux-scratchpad'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Persist sessions after restart
set -g @plugin 'tmux-plugins/tmux-continuum'    # Auto-save sessions
# set vim-tmux-navigator bindings
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-Left' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-Down' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-Up' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-Right' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"
bind-key -T prefix C-x kill-pane
# {{{tmux-plugin-sysstat
set -g @sysstat_cpu_view_tmpl '#[fg=magenta]C:#[default] #[fg=#{cpu.color}]#{cpu.pused}#[default]'
set -g @sysstat_mem_view_tmpl '#[fg=magenta]M:#[default] #[fg=#{mem.color}]#{mem.pused}#[default]'
set -g status-interval 3
# }}}
# {{{tmux-prefix-highlight
set -g @prefix_highlight_fg 'colour00'
set -g @prefix_highlight_bg 'red'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=colour00,bg=colour05,bold'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'
# }}}
# {{{tmux-fzf
TMUX_FZF_LAUNCH_KEY="C-Space"
# }}}
# {{{tmux-scratchpad
set-option -g @scratch-command-key 'Tab'
# }}}
# }}}
# vim: set fdm=marker fmr={{{,}}}:
# Popups (tms / tmux-sessionizer)
bind-key -T prefix C-o display-popup -E "tms"
bind-key -T prefix C-j display-popup -E "tms switch"
# Resurrect Pane Contents
set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'
# # Map your additional 'C-Arrow' keys alongside the default christoomey plugin mapping
# bind-key -n 'C-Left' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
# bind-key -n 'C-Down' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
# bind-key -n 'C-Up' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
# bind-key -n 'C-Right' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
run '~/.config/tmux/plugins/tpm/tpm'
