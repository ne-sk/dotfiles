# A TOML linter such as https://github.com/tombi-toml/tombi can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.

#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
show_hidden = true
ratio = [3, 8, 6]

[preview]
wrap            = "yes"

[opener]
junction = [{ run = "flatpak run re.sonny.Junction $@", orphan = true, desc = "Junction" }]

[open]
prepend_rules = [
	# Folder
	{ url = "*/", use = [ "edit", "junction", "junction", "open", "reveal" ] },
	# Text
	{ mime = "text/*", use = [ "edit", "junction", "reveal" ] },
	# Image
	{ mime = "image/*", use = [ "junction", "reveal" ] },
	# Media
	{ mime = "{audio,video}/*", use = [ "play", "junction", "reveal" ] },
	# Code
	{ mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "junction", "reveal" ] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "junction", "reveal" ] },
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "junction", "reveal" ] },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", use = "download" },
	# Fallback
	{ url = "*", use = [ "open", "junction", "reveal" ] },
]

[plugin]
prepend_preloaders = [
  # Replace magick, image, video with mediainfo
  { mime = "audio/*", run = "mediainfo"},
  { mime = "image/*", run = "mediainfo"},
  { mime = "video/*", run = "mediainfo"},
  { mime = "application/subrip", run = "mediainfo" },
  # Adobe Illustrator, Adobe Photoshop is image/adobe.photoshop, already handled above
  { mime = "application/postscript", run = "mediainfo" },
]

prepend_previewers = [
  { url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
  { mime = "text/csv", run = "miller" },
  { mime = "application/epub+zip", run = "epub-preview" },

	# Archive previewer
	{ mime = "application/*zip",            run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/x-tar",           run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/x-bzip2",         run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/x-7z-compressed", run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/x-rar",           run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/vnd.rar",         run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/x-xz",            run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/xz",              run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/x-zstd",          run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/zstd",            run = 'piper -- ouch l -t -y "$1"' },
	{ mime = "application/java-archive",    run = 'piper -- ouch l -t -y "$1"' },

  # Replace magick, image, video with mediainfo
  { mime = "audio/*", run = "mediainfo"},
  { mime = "image/*", run = "mediainfo"},
  { mime = "video/*", run = "mediainfo"},
  { mime = "application/subrip", run = "mediainfo" },
  # Adobe Illustrator, Adobe Photoshop is image/adobe.photoshop, already handled above
  { mime = "application/postscript", run = "mediainfo" },
  # There are more extensions which are supported by mediainfo.
  # Just add file's MIME type to `previewers`, `preloaders` above.
  # https://mediaarea.net/en/MediaInfo/Support/Formats
]
